# --- Mi BOX S / Android TV ---
media:
  enabled: true
  adb_path: "C:\\platform-tools\\adb.exe"
  adb_timeout_ms: 15000
  mibox_ip: "192.168.1.26"
  adb_port: 5555
  volume_max_steps: 15            # Mi Box S hardware max — used by volume_set()
  vpn_routing_enabled: true
  vpn_state_path: "vpn_state.json"
  vpn_status_cache_max_age_minutes: 5
  vpn_failure_policy: "open_anyway"
  vpn_route_by_app:
    youtube: "restart_autoconnect"
    stremio: "quick_connect"
  surfshark_launch_delay_ms: 400
  surfshark_connect_timeout_ms: 15000
  surfshark_status_poll_interval_ms: 1000
  surfshark_favorite_scan_pages: 2
  surfshark_favorite_scroll_delay_ms: 500
  surfshark_pre_sequence_wait_ms: 250
  surfshark_key_delay_ms: 100
  surfshark_post_sequence_wait_ms: 1200
  surfshark_restart_autoconnect_wait_ms: 0
  surfshark_ready_timeout_ms: 8000
  surfshark_ready_poll_interval_ms: 500
  surfshark_ready_stable_polls: 2
  surfshark_ready_settle_ms: 300
  surfshark_retry_count: 1
  surfshark_debug_capture_enabled: false
  surfshark_debug_capture_dir: "debug/surfshark"
  surfshark_route_table_path: "surfshark_routes.json"
  surfshark_country_aliases:
    albania:
      - "albania"
    portugal:
      - "portugal"
  surfshark_connected_markers:
    - "connected"
    - "protected"
  surfshark_connecting_markers:
    - "connecting"
    - "reconnecting"
  surfshark_disconnected_markers:
    - "disconnected"
    - "not connected"
    - "unprotected"
  youtube_warm_launch_delay_ms: 1500     # On cross-app launches, open YouTube first and wait before the deep link
  youtube_profile_select_on_cold_start: true  # Press OK once to clear the YouTube profile picker after warm launch
  youtube_profile_select_delay_ms: 1200  # Wait after the profile OK before opening playlist/search URLs
  ui_dump_retry_count: 3
  ui_dump_retry_delay_ms: 700
  app_launch_components:
    surfshark: "com.surfshark.vpnclient.android/.StartActivity"
  app_launch_categories:
    surfshark: "android.intent.category.LEANBACK_LAUNCHER"
  apps:
    stremio:   "com.stremio.one"
    youtube:   "com.google.android.youtube.tv"
    surfshark: "com.surfshark.vpnclient.android"
    spotify:   "com.spotify.tv.android"
