stremio:
  email: "likebot99@gmail.com"
  password: null
  autoplay_delay_ms: 2500
  library_sync_interval_minutes: 60
  history_refresh_max_age_minutes: 5
  watch_state_path: "watch_state.json"
  provider_preferences:
    - "comet"
    - "mediafusion"
    - "torrent"
  provider_aliases:
    comet:
      - "comet"
    mediafusion:
      - "mediafusion"
      - "media fusion"
    torrent:
      - "torrent"
      - "torrentio"
  provider_scan_pages: 3
  provider_scan_delay_ms: 800
  provider_fallback_policy: "ask"
  provider_ocr_enabled: true

